name: API Tests (Newman)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  newman:
    name: Run API Tests with Newman
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Newman
        run: npm install -g newman

      - name: Start server
        run: |
          npm start &
          sleep 5

      - name: Run API Tests
        run: |
          newman run API/SkipBookingCollection.json \
            --environment API/SkipBookingSystemEnv.json \
            --reporters cli,html \
            --reporter-html-export newman-report.html \
            --reporter-cli-summary

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.html
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          echo "## API Test Results (Newman)" >> $GITHUB_STEP_SUMMARY
          echo "Newman report available in artifacts" >> $GITHUB_STEP_SUMMARY