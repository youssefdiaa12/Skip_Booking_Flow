name: API Tests (Newman)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Newman & HTML Reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: Start server
        run: |
          npm start &
          sleep 5

      - name: Run API Tests
        run: newman run API/SkipBookingCollection.json --environment API/SkipBookingSystemEnv.json --reporters cli,htmlextra --reporter-htmlextra-export newman-report.html

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.html
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          echo "## ✅ API Test Results (Newman)" >> $GITHUB_STEP_SUMMARY
          echo "📄 HTML report available in workflow artifacts." >> $GITHUB_STEP_SUMMARY